name: tigat_mentor_app
description: A new Flutter project for Tigat Mentor Mobile App.

publish_to: 'none'

version: 1.1.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  go_router: ^12.1.1
  fl_chart: ^0.65.0
  provider: ^6.1.1
  
  # Fonts
  google_fonts: ^6.1.0
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  
  # Utility
  shared_preferences: ^2.2.2
  
  cupertino_icons: ^1.0.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
